name: Docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
      - run: npm ci # root deps (TypeDoc resolves the SDK's imports from here)
      - run: npm --prefix website ci
      - run: npm --prefix website run build
      - name: Assemble site (hand-made landing + Docusaurus docs)
        run: |
          mkdir -p site/docs
          cp web/index.html site/index.html
          cp -r website/build/. site/docs/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
